<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement — Mada-Brousse 2.0</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-bg">

<nav class="navbar">
  <div class="container">
    <a href="/" class="brand"><img src="/images/logo.svg" alt="" class="brand-logo" width="34" height="34">Mada<span class="dot">-</span>Brousse</a>
    <div class="nav-links">
      <a href="/">Accueil</a>
      <a href="/reservation">Réserver</a>
      <a href="/sieges">Sièges</a>
      <a href="/paiement">Paiement</a>
      <a href="/confirmation">Confirmation</a>
      <a href="/mes-reservations">Mes réservations</a>
      <a href="/admin-login">Admin</a>
    </div>
    <div class="nav-tools">
      <select class="lang-select" id="mb-lang-select">
        <option value="fr">FR</option>
        <option value="mg">MG</option>
        <option value="en">EN</option>
      </select>
      <button class="icon-btn" id="mb-theme-toggle" title="Mode sombre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      </button>
    </div>
  </div>
</nav>

<section>
  <div class="container" style="max-width:640px;">
    <h1>Paiement</h1>
    <div class="card">
      <h3 class="mt-0">Récapitulatif</h3>
      <div id="summary-lines"></div>
      <div class="checkbox-row mt-2">
        <input type="checkbox" id="pay-insurance">
        <label for="pay-insurance" style="margin:0;">Assurance voyage (+2000 Ar)</label>
      </div>
      <h3 class="mt-3">Mode de paiement</h3>
      <div class="pay-options">
        <div class="pay-option">
          <input type="radio" name="paymethod" id="pm-orange" value="Orange Money" checked>
          <label for="pm-orange">🟠 Orange Money</label>
        </div>
        <div class="pay-option">
          <input type="radio" name="paymethod" id="pm-mvola" value="MVola">
          <label for="pm-mvola">🟡 MVola</label>
        </div>
        <div class="pay-option">
          <input type="radio" name="paymethod" id="pm-card" value="Carte bancaire">
          <label for="pm-card">💳 Carte bancaire</label>
        </div>
      </div>
      <button class="btn btn-primary btn-block mt-2" id="pay-btn">Payer</button>
    </div>
  </div>
</section>

<div id="mb-footer"></div>

<script src="/js/app.js"></script>
<script>
  MB.initCommon();

  const draft = MB.get(MB.KEYS.DRAFT, null);
  const seats = MB.get(MB.KEYS.SEATS, []);
  if (!draft || !seats.length) { location.href = '/reservation'; }

  MB.fetchTrips().then(trips => {
    const trip = trips.find(t => t.id === draft.tripId);
    const ticketsTotal = trip.price * draft.count;
    const luggageTotal = draft.luggage * 5000;
    const subtotal = ticketsTotal + luggageTotal;
    let discount = 0;

    MB.fetchPromos().then(promos => {
      const promoObj = promos.find(p => p.code === (draft.promo || '').toUpperCase());
      if (promoObj) {
        discount = promoObj.type === 'percent' ? Math.round(subtotal * promoObj.value / 100) : promoObj.value;
      }
      renderLines();
    }).catch(() => renderLines());

    function renderLines() {
      const insurance = document.getElementById('pay-insurance').checked ? 2000 : 0;
      const total = subtotal - discount + insurance;
      document.getElementById('summary-lines').innerHTML = `
        <div class="summary-line"><span>${trip.departure} → ${trip.destination} (${draft.count} place(s))</span><span>${MB.formatAr(ticketsTotal)}</span></div>
        <div class="summary-line"><span>Bagages (${draft.luggage})</span><span>${MB.formatAr(luggageTotal)}</span></div>
        ${draft.promo ? `<div class="summary-line"><span>Code promo "${draft.promo}" ${discount ? '' : '(invalide)'}</span><span>${discount ? '-' + MB.formatAr(discount) : '—'}</span></div>` : ''}
        <div class="summary-line"><span>Assurance voyage</span><span>${MB.formatAr(insurance)}</span></div>
        <div class="summary-line total"><span>Total</span><span>${MB.formatAr(total)}</span></div>`;
    }

    document.getElementById('pay-insurance').addEventListener('change', renderLines);

    document.getElementById('pay-btn').addEventListener('click', () => {
      const method = document.querySelector('input[name="paymethod"]:checked').value;
      const insurance = document.getElementById('pay-insurance').checked;
      const finalTotal = subtotal - discount + (insurance ? 2000 : 0);

      MB.createReservation({
        trip_id: draft.tripId,
        customer_name: draft.name,
        customer_phone: draft.phone,
        customer_email: draft.email,
        seats_count: draft.count,
        luggage: draft.luggage,
        selected_seats: seats.join(','),
        payment_method: method,
        total: finalTotal,
        insurance: insurance,
        promo_code: draft.promo || null
      }).then(data => {
        localStorage.setItem('mb_last_reservation', data.id);
        location.href = '/confirmation';
      }).catch(() => {
        alert('Erreur lors de la réservation.');
      });
    });
  });

  const currentPath = window.location.pathname;
  document.querySelectorAll('.nav-links a').forEach(link => {
    if (link.getAttribute('href') === currentPath) link.classList.add('active');
  });
</script>
</body>
</html>
