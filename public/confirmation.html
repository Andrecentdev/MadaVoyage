<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmation — Mada-Brousse 2.0</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-bg">

<nav class="navbar">
  <div class="container">
    <a href="/" class="brand"><img src="/images/logo.svg" alt="" class="brand-logo" width="34" height="34">Mada<span class="dot">-</span>Brousse</a>
    <div class="nav-links">
      <a href="/">Accueil</a>
      <a href="/reservation">Réserver</a>
      <a href="/sieges">Sièges</a>
      <a href="/paiement">Paiement</a>
      <a href="/confirmation">Confirmation</a>
      <a href="/mes-reservations">Mes réservations</a>
      <a href="/admin-login">Admin</a>
    </div>
    <div class="nav-tools">
      <select class="lang-select" id="mb-lang-select">
        <option value="fr">FR</option>
        <option value="mg">MG</option>
        <option value="en">EN</option>
      </select>
      <button class="icon-btn" id="mb-theme-toggle" title="Mode sombre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      </button>
    </div>
  </div>
</nav>

<section>
  <div class="container text-center" style="max-width:500px;">
    <div class="page-hero-img" style="height:160px; background-image:url('/images/illustrations/confirmation-bg.svg'); background-color:#f9f6f0;">
    </div>
    <h2 class="mt-3">Réservation confirmée !</h2>
    <p class="muted" id="status-note"></p>
    <div class="card mt-2">
      <h5>N° <span id="reservation-id"></span></h5>
      <div id="qrcode" class="mt-2 mb-2">
        <canvas id="qrCanvas" width="150" height="150" style="margin:0 auto; display:block;"></canvas>
      </div>
      <p class="muted" style="font-size:.85rem;">Scannez à l'embarquement</p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:14px;">
        <button class="btn btn-secondary btn-sm" onclick="window.print()">🖨️ Imprimer</button>
        <button class="btn btn-primary btn-sm" id="download-ticket-btn">⬇️ Télécharger le ticket</button>
        <a href="/mes-reservations" class="btn btn-ghost btn-sm" style="color:var(--vert-fonce); border-color:var(--vert-fonce);">Mes réservations</a>
      </div>
    </div>
  </div>
</section>

<div id="mb-footer"></div>

<script src="/js/app.js"></script>
<script>
  MB.initCommon();
  const resId = localStorage.getItem('mb_last_reservation');
  if (resId) {
    document.getElementById('reservation-id').textContent = resId;
    const canvas = document.getElementById('qrCanvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#000';
      for (let i = 0; i < 10; i++) for (let j = 0; j < 10; j++) if (Math.random() > 0.5) ctx.fillRect(i*15, j*15, 12, 12);
      ctx.fillStyle = '#fff';
      ctx.fillRect(45, 45, 60, 60);
    }

    Promise.all([MB.fetchReservations(), MB.fetchTrips()]).then(([reservations, trips]) => {
      const resv = reservations.find(r => r.id === resId);
      if (!resv) return;
      const trip = trips.find(t => t.id === resv.trip_id);

      const statusText = {
        pending: "⏳ En attente de confirmation par notre équipe. Vous recevrez un message une fois validée.",
        confirmed: "✅ Votre réservation est confirmée.",
        cancelled: "❌ Cette réservation a été annulée."
      };
      document.getElementById('status-note').textContent = statusText[resv.status] || '';

      document.getElementById('download-ticket-btn').addEventListener('click', () => {
        const lines = [
          'MADA VOYAGE — TICKET DE RESERVATION',
          '======================================',
          `N° réservation : ${resv.id}`,
          `Statut : ${resv.status}`,
          trip ? `Trajet : ${trip.departure} -> ${trip.destination}` : '',
          trip ? `Départ : ${trip.departure_time} (${trip.duration})` : '',
          trip ? `Chauffeur : ${trip.driver || 'non attribué'}` : '',
          `Client : ${resv.customer_name}`,
          `Téléphone : ${resv.customer_phone || ''}`,
          `Sièges : ${resv.selected_seats}`,
          resv.travel_date ? `Date de voyage : ${resv.travel_date}` : '',
          `Total : ${MB.formatAr(resv.total)}`,
          '======================================',
          'Merci de voyager avec Mada Voyage !'
        ].filter(Boolean).join('\n');
        const blob = new Blob([lines], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `ticket-${resv.id}.txt`;
        a.click();
      });
    }).catch(() => {});
  }
  const currentPath = window.location.pathname;
  document.querySelectorAll('.nav-links a').forEach(link => {
    if (link.getAttribute('href') === currentPath) link.classList.add('active');
  });
</script>
</body>
</html>
