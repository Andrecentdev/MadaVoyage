<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes réservations — Mada-Brousse 2.0</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-bg">

<nav class="navbar">
  <div class="container">
    <a href="/" class="brand"><img src="/images/logo.svg" alt="" class="brand-logo" width="34" height="34">Mada<span class="dot">-</span>Brousse</a>
    <div class="nav-links">
      <a href="/">Accueil</a>
      <a href="/reservation">Réserver</a>
      <a href="/sieges">Sièges</a>
      <a href="/paiement">Paiement</a>
      <a href="/confirmation">Confirmation</a>
      <a href="/mes-reservations">Mes réservations</a>
      <a href="/admin-login">Admin</a>
    </div>
    <div class="nav-tools">
      <select class="lang-select" id="mb-lang-select">
        <option value="fr">FR</option>
        <option value="mg">MG</option>
        <option value="en">EN</option>
      </select>
      <button class="icon-btn" id="mb-theme-toggle" title="Mode sombre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      </button>
    </div>
  </div>
</nav>

<section>
  <div class="container">
    <h1>Mes réservations</h1>
    <div id="res-list"></div>
  </div>
</section>

<div id="mb-footer"></div>

<script src="/js/app.js"></script>
<script>
  MB.initCommon();

  MB.fetchReservations().then(reservations => {
    const wrap = document.getElementById('res-list');
    if (!reservations.length) {
      wrap.innerHTML = '<div class="empty-state">Aucune réservation. <a href="/">Réservez un trajet</a>.</div>';
      return;
    }
    wrap.innerHTML = reservations.map(r => `
      <div class="card mt-2" data-id="${r.id}">
        <div class="flex-between">
          <div>
            <strong>${r.id}</strong> 
            <span class="badge ${r.status==='confirmed'?'badge-confirmed':'badge-cancelled'}">${r.status}</span>
            <p>${r.customer_name} — Trajet ${r.trip_id} — Sièges ${r.selected_seats}</p>
            <p class="muted">Total : ${MB.formatAr(r.total)}</p>
          </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="btn btn-secondary btn-sm print-one">Imprimer</button>
          ${r.status==='confirmed' ? `<button class="btn btn-danger btn-sm cancel-one">Annuler</button>` : ''}
        </div>
      </div>
    `).join('');

    wrap.querySelectorAll('.cancel-one').forEach(btn => {
      btn.addEventListener('click', e => {
        const id = e.target.closest('[data-id]').dataset.id;
        if (confirm('Annuler cette réservation ?')) {
          MB.cancelReservation(id).then(() => location.reload());
        }
      });
    });
    wrap.querySelectorAll('.print-one').forEach(btn => btn.addEventListener('click', () => window.print()));
  });

  const currentPath = window.location.pathname;
  document.querySelectorAll('.nav-links a').forEach(link => {
    if (link.getAttribute('href') === currentPath) link.classList.add('active');
  });
</script>
</body>
</html>
