<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion admin — Mada-Brousse 2.0</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css">
</head>
<body data-no-chat class="page-bg">

<nav class="navbar">
  <div class="container">
    <a href="/" class="brand"><img src="/images/logo.svg" alt="" class="brand-logo" width="34" height="34">Mada<span class="dot">-</span>Brousse</a>
    <div class="nav-links">
      <a href="/">Accueil</a>
      <a href="/reservation">Réserver</a>
      <a href="/sieges">Sièges</a>
      <a href="/paiement">Paiement</a>
      <a href="/confirmation">Confirmation</a>
      <a href="/mes-reservations">Mes réservations</a>
      <a href="/admin-login">Admin</a>
    </div>
    <div class="nav-tools">
      <select class="lang-select" id="mb-lang-select">
        <option value="fr">FR</option>
        <option value="mg">MG</option>
        <option value="en">EN</option>
      </select>
      <button class="icon-btn" id="mb-theme-toggle" title="Mode sombre">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      </button>
    </div>
  </div>
</nav>

<section>
  <div class="container" style="max-width:420px;">
    <h1 class="text-center">Espace administrateur</h1>
    <div class="card mt-2">
      <form id="login-form">
        <div class="form-group">
          <label for="a-user">Identifiant</label>
          <input type="text" id="a-user" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="a-pass">Mot de passe</label>
          <input type="password" id="a-pass" required autocomplete="current-password">
        </div>
        <p class="help-text" id="login-error" style="color:#a83232; display:none;">Identifiants incorrects.</p>
        <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
        <p class="help-text text-center mt-2">Demo : admin / mada2025</p>
      </form>
    </div>
  </div>
</section>

<div id="mb-footer"></div>

<script src="/js/app.js"></script>
<script>
  MB.initCommon();
  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const user = document.getElementById('a-user').value.trim();
    const pass = document.getElementById('a-pass').value;
    MB.adminLogin(user, pass).then(data => {
      if (data.success) {
        localStorage.setItem(MB.KEYS.ADMIN, 'true');
        location.href = '/admin';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }).catch(() => {
      document.getElementById('login-error').style.display = 'block';
    });
  });
  const currentPath = window.location.pathname;
  document.querySelectorAll('.nav-links a').forEach(link => {
    if (link.getAttribute('href') === currentPath) link.classList.add('active');
  });
</script>
</body>
</html>
